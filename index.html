<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        bg: 'var(--bg)',
        surface: 'var(--surface)',
        elevated: 'var(--elevated)',
        border: 'var(--border)',
        txt: 'var(--txt)',
        muted: 'var(--muted)',
        accent: 'var(--accent)',
      }
    }
  }
}

<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --elevated: #242736;
    --border: #2e3144;
    --txt: #e2e4f0;
    --muted: #8b8fa8;
    --accent: #6c8cff;
  }
  .light {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --elevated: #ffffff;
    --border: #e2e4ef;
    --txt: #1a1d27;
    --muted: #6b7094;
    --accent: #5b7af5;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--txt); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .sidebar { background: var(--surface); border-right: 1px solid var(--border); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.2s; }
  .card:hover { border-color: color-mix(in srgb, var(--border) 60%, var(--txt) 40%); }

  .nav-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.625rem 1rem; border-radius: 8px;
    color: var(--muted); font-size: 0.875rem; cursor: pointer;
    transition: all 0.15s;
  }
  .nav-item:hover { background: var(--elevated); color: var(--txt); }
  .nav-item.active { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); font-weight: 500; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: var(--border); border-radius: 11px; transition: 0.2s; }
  .toggle .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: var(--muted); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: color-mix(in srgb, var(--accent) 30%, transparent); }
  .toggle input:checked + .slider:before { transform: translateX(18px); background: var(--accent); }

  .input {
    width: 100%; background: var(--elevated); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.875rem;
    color: var(--txt); outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  .input:focus { border-color: var(--accent); }
  .input-mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 0.8125rem; }

  .btn {
    padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.875rem; cursor: pointer;
    transition: all 0.15s; border: none; font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--elevated); color: var(--txt); }
  .btn-danger { background: color-mix(in srgb, #f87171 15%, transparent); color: #f87171; }
  .btn-danger:hover { background: color-mix(in srgb, #f87171 25%, transparent); }

  .badge { font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 9999px; }
  .badge-blue { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
  .badge-green { background: color-mix(in srgb, #4ade80 12%, transparent); color: #4ade80; }
  .badge-red { background: color-mix(in srgb, #f87171 12%, transparent); color: #f87171; }
  .badge-amber { background: color-mix(in srgb, #fbbf24 12%, transparent); color: #fbbf24; }

  .tab { padding: 0.5rem 1rem; font-size: 0.875rem; border-radius: 8px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .tab:hover { color: var(--txt); }
  .tab.active { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); }

  #page-container { animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
  .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 640px; width: 100%; margin: 0 1rem; max-height: 80vh; overflow-y: auto; }

  .bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; background: var(--elevated); }
  .bar > div { transition: width 0.3s; }

  .stat-value { font-size: 1.875rem; font-weight: 700; line-height: 1.2; }
  .skeleton { background: var(--elevated); border-radius: 8px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100; padding: 0.75rem 1.25rem; border-radius: 12px; font-size: 0.875rem; animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

let lang = localStorage.getItem('cc-lang') || 'en';
function t(path) {
  const parts = path.split('.');
  let obj = T[lang];
  for (const p of parts) { obj = obj?.[p]; }
  return obj || path;
}
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('cc-lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const val = t(key);
    if (val !== key) el.textContent = val;
  });
  $('#lang-btn').textContent = t('lang.label');
  applyTheme();
  render();
}

// ==================== STATE ====================
const S = {
  page: 'dashboard',
  theme: localStorage.getItem('cc-theme') || 'dark',
  data: {},
  loading: false,
};

// ==================== API ====================
const API = {
  async get(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async put(url, data) {
    const r = await fetch(url, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(url, data) {
    const r = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async del(url) {
    const r = await fetch(url, { method: 'DELETE' });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ==================== UTILS ====================
function fmtBytes(b) {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(1) + ' ' + u[i];
}
function fmtDate(iso) {
  if (!iso) return '-';
  try { return new Date(iso).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return iso; }
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function toast(msg, type='success') {
  const t = $('#toast');
  t.className = `toast ${type === 'error' ? 'badge-red' : type === 'warn' ? 'badge-amber' : 'badge-green'}`;
  t.style.background = type === 'error' ? 'var(--surface)' : type === 'warn' ? 'var(--surface)' : 'var(--surface)';
  t.style.border = `1px solid ${type === 'error' ? '#f87171' : type === 'warn' ? '#fbbf24' : '#4ade80'}`;
  t.style.color = type === 'error' ? '#f87171' : type === 'warn' ? '#fbbf24' : '#4ade80';
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

function openModal(html) {
  $('#modal-content').innerHTML = html;
  $('#modal-overlay').classList.remove('hidden');
}
function closeModal() {
  $('#modal-overlay').classList.add('hidden');
}

function loading(html='') {
  return `<div class="flex items-center justify-center py-20"><div class="skeleton w-16 h-16 rounded-full"></div></div>`;
}

// ==================== THEME ====================
function applyTheme() {
  document.documentElement.classList.toggle('light', S.theme === 'light');
  $('#theme-btn').textContent = S.theme === 'dark' ? t('theme.light') : t('theme.dark');
}
function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('cc-theme', S.theme);
  applyTheme();
}

// ==================== ROUTER ====================
function navigate(page) {
  S.page = page;
  $$('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const c = $('#page-container');
  c.style.animation = 'none';
  c.offsetHeight; // reflow
  c.style.animation = '';
  render();
}

async function render() {
  const container = $('#page-container');
  switch(S.page) {
    case 'dashboard': await renderDashboard(container); break;
    case 'plugins': await renderPlugins(container); break;
    case 'sessions': await renderSessions(container); break;
    case 'config': await renderConfig(container); break;
    case 'mcp': await renderMCP(container); break;
    case 'skills': await renderSkills(container); break;
    case 'cleanup': await renderCleanup(container); break;
    case 'system': await renderSystem(container); break;
  }
}

async function viewPluginDetail(key) {

    const d = await API.get(`/api/plugins/${encodeURIComponent(key)}`);

async function deletePlugin(key, name) {

}

function filterPlugins(query) {
  const q = query.toLowerCase();
  $$('.plugin-card').forEach(el => {
    const match = el.dataset.name.includes(q);
    el.style.display = match ? '' : 'none';
  });
}

function filterBySource(tabEl, source) {
  $$('#plugin-tabs .tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  $$('.plugin-card').forEach(el => {
    el.style.display = (!source || el.dataset.source === source) ? '' : 'none';
  });
}

  }).catch(() => {
    prompt(t('sessions.resumeCli'), cmd);
  });
}

async function deleteSession(project, id) {
  if (!confirm(`${t('sessions.confirmDelete')} ${id.slice(0,8)}...?`)) return;
  try {
    await API.del(`/api/sessions/${encodeURIComponent(project)}/${encodeURIComponent(id)}`);
    toast(t('sessions.deleted'));

// ==================== CONFIG ====================
let configTab = 'settings';
let configData = {};

async function renderConfig(el) {
  el.innerHTML = loading();
  try {
    const [settings, claudeMd, local] = await Promise.all([
      API.get('/api/settings'),
      API.get('/api/claude-md'),
      API.get('/api/settings-local'),
    ]);
    configData = { settings, claudeMd, local };

    el.innerHTML = `
      <h2 class="text-xl font-semibold mb-6">${t('config.title')}</h2>
      <div class="flex gap-1 mb-6" id="config-tabs">
        <div class="tab ${configTab==='settings'?'active':''}" onclick="switchConfigTab('settings')">settings.json</div>
        <div class="tab ${configTab==='claude-md'?'active':''}" onclick="switchConfigTab('claude-md')">CLAUDE.md</div>
        <div class="tab ${configTab==='local'?'active':''}" onclick="switchConfigTab('local')">${t('config.permissions')}</div>
      </div>
      <div id="config-content"></div>
    `;
    renderConfigTab();
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:#f87171">${t('config.loadFail')}: ${esc(e.message)}</p></div>`;
  }
}

function switchConfigTab(tab) {
  configTab = tab;
  $$('#config-tabs .tab').forEach(el => {
    const isSettings = tab === 'settings' && el.textContent.includes('settings');
    const isClaudeMd = tab === 'claude-md' && el.textContent.includes('CLAUDE');
    const isLocal = tab === 'local' && el.textContent.includes(t('config.permissions'));
    el.classList.toggle('active', isSettings || isClaudeMd || isLocal);
  });
  renderConfigTab();
}

function renderConfigTab() {
  const el = $('#config-content');
  if (configTab === 'settings') {
    const s = configData.settings;
    const env = s.env || {};
    el.innerHTML = `
      <div class="space-y-6">
        <div class="card">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4" style="color:var(--muted)">${t('config.modelSettings')}</h3>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-sm" style="color:var(--muted)">${t('config.model')}</label>
              <input class="input input-mono mt-1" value="${esc(s.model || '')}" id="cfg-model">
            </div>
            <div>
              <label class="text-sm" style="color:var(--muted)">${t('config.effortLevel')}</label>
              <select class="input mt-1" id="cfg-effort">
                ${['max','high','default','low'].map(v => `<option ${s.effortLevel===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4" style="color:var(--muted)">${t('config.envVars')}</h3>
          <div class="space-y-3" id="env-vars">
            ${Object.entries(env).map(([k,v]) => envVarRow(k, v)).join('')}
          </div>
          <button class="btn btn-ghost text-xs mt-3" onclick="addEnvVar()">${t('config.addVar')}</button>
        </div>
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-xs font-semibold uppercase tracking-wider" style="color:var(--muted)">${t('config.enabledPlugins')} (${Object.keys(s.enabledPlugins||{}).length})</h3>
            <span class="text-xs" style="color:var(--muted)">${t('config.manageInPlugins')}</span>
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button class="btn btn-ghost" onclick="renderConfig($('#page-container'))">${t('config.reset')}</button>
          <button class="btn btn-primary" onclick="saveSettings()">${t('config.save')}</button>
        </div>
      </div>
    `;
  } else if (configTab === 'claude-md') {
    el.innerHTML = `
      <div class="space-y-4">
        <div class="card">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-xs font-semibold uppercase tracking-wider" style="color:var(--muted)">CLAUDE.md · ${t('config.globalMemory')}</h3>
            <span class="text-xs" style="color:var(--muted)">${t('config.autoRead')}</span>
          </div>
          <textarea class="input input-mono" rows="16" id="claude-md-editor" style="resize:vertical">${esc(configData.claudeMd.content || '')}</textarea>
        </div>
        <div class="flex justify-end gap-3">
          <button class="btn btn-ghost" onclick="renderConfig($('#page-container'))">${t('config.reset')}</button>
          <button class="btn btn-primary" onclick="saveClaudeMd()">${t('config.save')}</button>
        </div>
      </div>
    `;
  } else if (configTab === 'local') {
    const perms = configData.local.permissions?.allow || [];
    el.innerHTML = `
      <div class="space-y-4">
        <div class="card">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4" style="color:var(--muted)">${t('config.authorizedPerms')} (${perms.length} ${t('config.entries')})</h3>
          <div class="space-y-1 max-h-[60vh] overflow-y-auto">
            ${perms.map((p, i) => `
              <div class="flex items-center gap-3 p-2 rounded hover:bg-[var(--elevated)] group">
                <span class="badge ${p.startsWith('Bash') ? 'badge-blue' : p.startsWith('mcp') ? 'badge-green' : 'badge-amber'}">${p.startsWith('Bash') ? 'Bash' : p.startsWith('mcp') ? 'MCP' : p.startsWith('Skill') ? 'Skill' : 'Other'}</span>
                <span class="text-sm font-mono flex-1 truncate">${esc(p)}</span>
                <button class="btn btn-danger text-xs px-2 py-0.5 opacity-0 group-hover:opacity-100" onclick="removePermission(${i})">${t('sessions.delete')}</button>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }
}

function envVarRow(k, v) {
  const isSecret = k.toLowerCase().includes('token') || k.toLowerCase().includes('key') || k.toLowerCase().includes('password');
  return `<div class="flex items-center gap-3">
    <input class="input input-mono flex-shrink-0" style="width:280px;color:var(--accent)" value="${esc(k)}" data-env-key>
    <input class="input input-mono flex-1" value="${esc(v)}" type="${isSecret ? 'password' : 'text'}" data-env-val>
    <button class="btn btn-danger text-xs px-2 py-1 flex-shrink-0" onclick="this.parentElement.remove()">✕</button>
  </div>`;
}

function addEnvVar() {
  const container = $('#env-vars');
  const div = document.createElement('div');
  div.innerHTML = envVarRow('NEW_VAR', '');
  container.appendChild(div.firstElementChild);
}

async function saveSettings() {
  try {
    const env = {};
    $$('#env-vars > div').forEach(row => {
      const key = row.querySelector('[data-env-key]').value.trim();
      const val = row.querySelector('[data-env-val]').value;
      if (key) env[key] = val;
    });
    configData.settings.model = $('#cfg-model').value;
    configData.settings.effortLevel = $('#cfg-effort').value;
    configData.settings.env = env;
    await API.put('/api/settings', configData.settings);
    toast(t('config.saved'));
  } catch(e) {
    toast(t('config.saveFail') + ': ' + e.message, 'error');
  }
}

async function saveClaudeMd() {
  try {
    await API.put('/api/claude-md', { content: $('#claude-md-editor').value });
    toast(t('config.claudeMdSaved'));
  } catch(e) {
    toast(t('config.saveFail') + ': ' + e.message, 'error');
  }
}

async function removePermission(index) {
  if (!confirm(t('config.confirmDeletePerm'))) return;
  configData.local.permissions.allow.splice(index, 1);
  try {
    await API.put('/api/settings-local', configData.local);
    toast(t('config.permDeleted'));
    renderConfigTab();
  } catch(e) {
    toast(t('config.permDeleteFail') + ': ' + e.message, 'error');
  }
}

let skillsTab = 'installed';
let marketplaceData = null;

async function renderSkills(el) {
  el.innerHTML = loading();
  try {
    const d = await API.get('/api/skills');
    const skills = d.skills;

    el.innerHTML = `
      <h2 class="text-xl font-semibold mb-6">${t('skills.title')}</h2>
      <div class="flex gap-1 mb-6" id="skills-tabs">
        <div class="tab ${skillsTab==='installed'?'active':''}" onclick="switchSkillsTab('installed')">${t('skills.installed')}</div>
        <div class="tab ${skillsTab==='marketplace'?'active':''}" onclick="switchSkillsTab('marketplace')">${t('skills.marketplace')}</div>
      </div>
      <div id="skills-content"></div>
    `;

    if (skillsTab === 'installed') {
      renderInstalledSkills(skills, d.total);
    } else {
      renderMarketplaceSkills();
    }
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:#f87171">${t('skills.loadFail')}: ${esc(e.message)}</p></div>`;
  }
}

function switchSkillsTab(tab) {
  skillsTab = tab;
  $$('#skills-tabs .tab').forEach(el => {
    const isInstalled = tab === 'installed' && el.textContent.includes(t('skills.installed'));
    const isMarketplace = tab === 'marketplace' && el.textContent.includes(t('skills.marketplace'));
    el.classList.toggle('active', isInstalled || isMarketplace);
  });
  if (tab === 'installed') {
    API.get('/api/skills').then(d => renderInstalledSkills(d.skills, d.total));
  } else {
    renderMarketplaceSkills();
  }
}

function renderInstalledSkills(skills, total) {
  $('#skills-content').innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <div class="relative flex-1 max-w-md">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color:var(--muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="input pl-10" placeholder="${t('skills.search')} ${total} ${t('skills.skills')}..." oninput="filterSkillCards(this.value)" id="skill-search">
      </div>
      <span class="text-sm" style="color:var(--muted)">${t('skills.total')} ${total}</span>
    </div>
    <div class="grid grid-cols-3 gap-3" id="skill-grid">
      ${skills.map(s => skillCard(s)).join('')}

}

async function renderMarketplaceSkills() {
  const el = $('#skills-content');
  el.innerHTML = loading();
  try {
    const d = await API.get('/api/marketplace/skills');
    marketplaceData = d.marketplaces;

    el.innerHTML = `
      <div class="flex gap-1 mb-4 flex-wrap" id="mp-tabs">

      $('#mp-skills-grid').innerHTML = `<div class="card"><p class="text-sm" style="color:var(--muted)">${t('marketplace.noMarketplaces')}</p></div>`;

    el.innerHTML = `<div class="card"><p style="color:#f87171">${t('marketplace.loadFail')}: ${esc(e.message)}</p></div>`;

function selectMarketplace(tabEl, index) {

function skillCard(s) {

    `);
  } catch(e) {
    openModal(`<div class="p-6"><p style="color:#f87171">${esc(e.message)}</p></div>`);
  }
}

async function deleteSkill(name) {
  if (!confirm(`${t('skills.confirmDelete')} "${name}"?`)) return;
  try {
    await API.del(`/api/skills/${encodeURIComponent(name)}`);
    toast(t('skills.deleted'));
    closeModal();
    render();
  } catch(e) {
    toast(t('skills.deleteFail') + ': ' + e.message, 'error');
  }
}

async function toggleSkill(name, disable) {
  try {
    await API.post('/api/skills/toggle', { name, disabled: disable });
    toast(disable ? t('skills.disabled') : t('skills.enabled'));
    closeModal();
    render();
  } catch(e) {
    toast((disable ? t('skills.disableFail') : t('skills.enableFail')) + ': ' + e.message, 'error');
  }
}

// ==================== CLEANUP ====================
async function renderCleanup(el) {
  el.innerHTML = loading();
  try {
    const d = await API.get('/api/storage');
    const targets = [
      { key: 'cache', label: t('cleanup.cache.label'), desc: t('cleanup.cache.desc') },
      { key: 'debug', label: t('cleanup.debug.label'), desc: t('cleanup.debug.desc') },
      { key: 'paste-cache', label: t('cleanup.pasteCache.label'), desc: t('cleanup.pasteCache.desc') },
      { key: 'file-history', label: t('cleanup.fileHistory.label'), desc: t('cleanup.fileHistory.desc') },
      { key: 'shell-snapshots', label: t('cleanup.shellSnapshots.label'), desc: t('cleanup.shellSnapshots.desc') },
      { key: 'session-env', label: t('cleanup.sessionEnv.label'), desc: t('cleanup.sessionEnv.desc') },
      { key: 'backups', label: t('cleanup.backups.label'), desc: t('cleanup.backups.desc') },
      { key: 'todos', label: t('cleanup.todos.label'), desc: t('cleanup.todos.desc') },
    ];

    el.innerHTML = `
      <h2 class="text-xl font-semibold mb-6">${t('cleanup.title')}</h2>
      <div class="space-y-3">
        ${targets.map(tg => {
          const size = d.storage[tg.key] || 0;
          return `<div class="card !p-4">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <input type="checkbox" class="cleanup-cb" data-target="${tg.key}" onchange="updateCleanupPreview()" style="accent-color:var(--accent);width:18px;height:18px">
                <div>
                  <h4 class="text-sm font-medium">${tg.label}</h4>
                  <p class="text-xs" style="color:var(--muted)">${tg.desc}</p>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <button class="btn btn-ghost text-xs px-2 py-1" onclick="openFolder('${tg.key}')" title="${t('cleanup.openFolder')}">
                  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                </button>
                <span class="text-sm font-mono" style="color:${size > 1048576 ? '#fbbf24' : 'var(--muted)'}">${fmtBytes(size)}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="card mt-6" style="border-color:color-mix(in srgb, #fbbf24 20%, transparent);background:color-mix(in srgb, #fbbf24 3%, var(--surface))">
        <div class="flex items-center justify-between">
          <div>
            <h4 class="text-sm font-medium">${t('cleanup.estimated')}</h4>
            <div class="text-2xl font-bold mt-1" style="color:#fbbf24" id="cleanup-size">0 B</div>
          </div>
          <button class="btn px-6 py-2.5 text-white" style="background:#f87171" onclick="executeCleanup()" id="cleanup-btn" disabled>${t('cleanup.execute')}</button>
        </div>
      </div>
    `;

    S.data.cleanupStorage = d.storage;
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:#f87171">${t('cleanup.loadFail')}: ${esc(e.message)}</p></div>`;
  }
}

function updateCleanupPreview() {
  let total = 0;
  $$('.cleanup-cb:checked').forEach(cb => {
    total += S.data.cleanupStorage[cb.dataset.target] || 0;
  });
  $('#cleanup-size').textContent = fmtBytes(total);
  $('#cleanup-btn').disabled = total === 0;
}

async function executeCleanup() {
  const targets = [...$$('.cleanup-cb:checked')].map(cb => cb.dataset.target);
  if (targets.length === 0) return;
  if (!confirm(t('cleanup.confirm'))) return;

  try {
    await API.post('/api/cleanup/execute', { targets });
    toast(t('cleanup.done'));
    render();
  } catch(e) {
    toast(t('cleanup.fail') + ': ' + e.message, 'error');
  }
}

async function openFolder(relPath) {
  try {
    await API.post('/api/open-folder', { path: relPath });
  } catch(e) {
    toast(t('cleanup.openFail') + ': ' + e.message, 'error');
  }
}

// ==================== SYSTEM ====================
async function renderSystem(el) {
  el.innerHTML = loading();
  try {
    const [stats, history] = await Promise.all([
      API.get('/api/stats'),
      API.get('/api/history'),
    ]);

    const modelUsage = stats.modelUsage || stats.model_usage || {};
    const modelEntries = Object.entries(modelUsage).sort((a,b) => (b[1]?.inputTokens||0) - (a[1]?.inputTokens||0));

    el.innerHTML = `
      <h2 class="text-xl font-semibold mb-6">${t('system.title')}</h2>

      <div class="grid grid-cols-2 gap-6">
        <div class="card">
          <h3 class="text-sm font-semibold mb-4" style="color:var(--muted)">${t('system.modelUsage')}</h3>
          <div class="space-y-4">
            ${modelEntries.length > 0 ? modelEntries.map(([name, u]) => {
              const inp = u.inputTokens || 0;
              const out = u.outputTokens || 0;
              const maxT = Math.max(...modelEntries.map(([_,v]) => (v.inputTokens||0) + (v.outputTokens||0)));
              const pct = maxT > 0 ? ((inp + out) / maxT * 100) : 0;
              return `<div>
                <div class="flex items-center justify-between text-sm mb-1.5">
                  <span class="font-medium">${esc(name)}</span>
                  <span style="color:var(--muted)">${(inp/1e6).toFixed(1)}M in · ${(out/1e6).toFixed(1)}M out</span>
                </div>
                <div class="bar"><div style="width:${pct}%;background:var(--accent)"></div></div>
              </div>`;
            }).join('') : `<p class="text-sm" style="color:var(--muted)">${t('system.noData')}</p>`}
          </div>
        </div>

        <div class="card">
          <h3 class="text-sm font-semibold mb-4" style="color:var(--muted)">${t('system.activityHours')}</h3>
          <div class="grid grid-cols-12 gap-1" id="heatmap">
            ${(() => {
              const hours = stats.hourCounts || stats.hour_counts || {};
              const maxH = Math.max(...Object.values(hours), 1);
              let html = '';
              for (let h = 0; h < 24; h++) {
                const count = hours[h] || hours[String(h)] || 0;
                const opacity = Math.max(count / maxH, 0.05);
                html += `<div class="aspect-square rounded" style="background:var(--accent);opacity:${opacity}" title="${h}:00 · ${count}"></div>`;
              }
              return html;
            })()}
          </div>
          <div class="flex justify-between text-xs mt-2" style="color:var(--muted)">
            <span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>23:00</span>
          </div>
        </div>

        <div class="card">
          <h3 class="text-sm font-semibold mb-4" style="color:var(--muted)">${t('system.dailyStats')}</h3>
          <div class="grid grid-cols-3 gap-4">
            ${(() => {
              const ds = stats.dailyStats || stats.daily_stats || {};
              const days = Object.entries(ds).sort((a,b) => b[0].localeCompare(a[0])).slice(0, 5);
              return days.length > 0 ? `<div class="col-span-3 space-y-2">
                ${days.map(([date, info]) => `
                  <div class="flex items-center justify-between text-sm p-2 rounded" style="background:var(--elevated)">
                    <span class="font-mono">${date}</span>
                    <div class="flex gap-4" style="color:var(--muted)">
                      <span>${info.messageCount || info.message_count || 0} ${t('system.messages')}</span>
                      <span>${info.sessionCount || info.session_count || 0} ${t('sessions.sessionCount')}</span>
                    </div>
                  </div>
                `).join('')}
              </div>` : `<p class="text-sm col-span-3" style="color:var(--muted)">${t('system.noData')}</p>`;
            })()}
          </div>
        </div>

        <div class="card">
          <h3 class="text-sm font-semibold mb-4" style="color:var(--muted)">${t('system.history')} <span class="font-normal">(${history.total} ${t('system.entries')})</span></h3>
          <div class="space-y-2 max-h-80 overflow-y-auto">
            ${(history.entries || []).slice(0, 30).map(h => `
              <div class="flex items-start gap-3 p-2 rounded" style="background:var(--elevated)">
                <div class="w-1.5 h-1.5 rounded-full mt-2 flex-shrink-0" style="background:var(--accent)"></div>
                <div class="flex-1 min-w-0">
                  <p class="text-sm truncate">${esc(h.display || h.query || '-')}</p>
                  <p class="text-xs" style="color:var(--muted)">${fmtDate(h.timestamp)} · ${esc(h.projectPath || '')}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:#f87171">${t('system.loadFail')}: ${esc(e.message)}</p></div>`;
  }
}

// ==================== INIT ====================
function init() {
  // Apply saved language
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const val = t(key);
    if (val !== key) el.textContent = val;
  });
  $('#lang-btn').textContent = t('lang.label');
  applyTheme();
  navigate('dashboard');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
